<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Book Registration</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(120deg,#2c3e50,#000);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.form-box {
    background:#fff;
    padding:30px;
    width:400px;
    border-radius:12px;
}

h2 { text-align:center; color:#2c3e50; }

input {
    width:100%;
    padding:10px;
    margin-top:10px;
    border:1px solid #ccc;
    border-radius:8px;
}

button {
    width:100%;
    padding:12px;
    margin-top:15px;
    background:#2c3e50;
    border:none;
    color:#fff;
    font-weight:bold;
    border-radius:8px;
}

button:hover { background:#C9A84C; }
</style>
</head>

<body>
<div class="form-box">
    <h2>Book Registration</h2>

    <form>
        <input type="text" placeholder="Book Title">
        <input type="text" placeholder="Author Name">
        <input type="text" placeholder="ISBN Number">
        <input type="date">

        <button type="submit">Register Book</button>
    </form>
</div>
</body>
</html>
