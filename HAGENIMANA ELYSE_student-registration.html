<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Student Registration</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg,#0B1829,#1E3350);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.form-box {
    background:#fff;
    padding:30px;
    width:400px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2 { text-align:center; color:#0B1829; }

input, select {
    width:100%;
    padding:10px;
    margin-top:10px;
    border:1px solid #ccc;
    border-radius:8px;
}

button {
    width:100%;
    padding:12px;
    margin-top:15px;
    background:#C9A84C;
    border:none;
    color:#fff;
    font-weight:bold;
    border-radius:8px;
    cursor:pointer;
}
button:hover { background:#8B6914; }
</style>
</head>

<body>
<div class="form-box">
    <h2>Student Registration</h2>

    <form>
        <input type="text" placeholder="Full Name" required>
        <input type="email" placeholder="Email" required>
        <input type="text" placeholder="Student ID" required>

        <select required>
            <option value="">Select Gender</option>
            <option>Male</option>
            <option>Female</option>
        </select>

        <input type="text" placeholder="Course" required>

        <button type="submit">Register</button>
    </form>
</div>
</body>
</html>
