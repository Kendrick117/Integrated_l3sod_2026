<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Login — SEZERLAND AI ALPHA</title>
<style>
  :root {
    --primary: #2563EB;
    --primary-dark: #1E40AF;
    --primary-light: #3B82F6;
    --primary-ghost: #EFF6FF;
    --bg: #F8FAFC;
    --card: #FFFFFF;
    --border: #E5E7EB;
    --text-primary: #0F172A;
    --text-secondary: #475569;
    --text-muted: #94A3B8;
    --radius-md: 12px;
    --radius-lg: 16px;
    --radius-xl: 20px;
    --shadow-md: 0 4px 16px rgba(0,0,0,0.06);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.08);
    --shadow-glow: 0 0 0 3px rgba(37,99,235,0.15);
    --transition: 0.2s ease;
    --font: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text-primary);
    line-height: 1.6;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
    position: relative;
    background:
      radial-gradient(ellipse 80% 50% at 20% 10%, rgba(37,99,235,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(245,158,11,0.04) 0%, transparent 60%),
      linear-gradient(175deg, #F8FAFC 0%, #EFF6FF 40%, #F8FAFC 100%);
  }

  .page::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(37,99,235,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(37,99,235,0.025) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
  }

  .page::after {
    content: '';
    position: fixed;
    top: -120px;
    right: -120px;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(37,99,235,0.08) 0%, transparent 70%);
    filter: blur(40px);
    pointer-events: none;
  }

  .blob-bl {
    position: fixed;
    bottom: -100px;
    left: -100px;
    width: 350px;
    height: 350px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(245,158,11,0.06) 0%, transparent 70%);
    filter: blur(40px);
    pointer-events: none;
  }

  .container {
    width: 100%;
    max-width: 440px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header { text-align: center; margin-bottom: 32px; }

  .logo {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
  }

  .logo-icon {
    width: 44px;
    height: 44px;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    border-radius: var(--radius-md);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 12px rgba(37,99,235,0.3);
    position: relative;
    overflow: hidden;
  }

  .logo-icon::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.15) 50%, transparent 60%);
  }

  .logo-icon svg {
    width: 22px;
    height: 22px;
    fill: #FFF;
    position: relative;
    z-index: 1;
  }

  .logo-text {
    font-size: 1.2rem;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  .logo-text span { color: var(--primary); }

  .header-sub {
    font-size: 0.8125rem;
    color: var(--text-muted);
  }

  /* Card */
  .card {
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(229,231,235,0.7);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow-lg);
    padding: 40px 36px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
  }

  .form-head { text-align: center; margin-bottom: 32px; }

  .badge {
    display: inline-flex;
    align-items: center;
    padding: 3px 10px;
    font-size: 0.6875rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    border-radius: 100px;
    margin-bottom: 12px;
    background: var(--primary-ghost);
    color: var(--primary);
    border: 1px solid rgba(37,99,235,0.15);
  }

  .form-head h2 {
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: -0.03em;
    margin-bottom: 4px;
  }

  .form-head p {
    font-size: 0.875rem;
    color: var(--text-muted);
  }

  /* Form */
  .form-group { margin-bottom: 20px; }

  .form-group label {
    display: block;
    font-size: 0.8125rem;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }

  .input-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }

  .input-wrap svg.ico {
    position: absolute;
    left: 14px;
    width: 18px;
    height: 18px;
    fill: none;
    stroke: var(--text-muted);
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
    pointer-events: none;
    transition: stroke var(--transition);
    z-index: 1;
  }

  .input-wrap:focus-within svg.ico { stroke: var(--primary); }

  .fi {
    width: 100%;
    height: 48px;
    padding: 0 14px 0 44px;
    font-family: var(--font);
    font-size: 0.9rem;
    color: var(--text-primary);
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-md);
    outline: none;
    transition: all var(--transition);
    appearance: none;
  }

  .fi::placeholder { color: var(--text-muted); }
  .fi:hover { border-color: #CBD5E1; }
  .fi:focus {
    border-color: var(--primary);
    box-shadow: var(--shadow-glow);
    background: #FFF;
  }

  .chk-group {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 24px;
  }

  .chk-group input[type="checkbox"] {
    width: 18px;
    height: 18px;
    margin-top: 2px;
    accent-color: var(--primary);
    cursor: pointer;
    flex-shrink: 0;
  }

  .chk-group label {
    font-size: 0.8125rem;
    color: var(--text-secondary);
    cursor: pointer;
    margin-bottom: 0;
  }

  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    height: 50px;
    padding: 0 24px;
    font-family: var(--font);
    font-size: 0.9375rem;
    font-weight: 600;
    border: none;
    border-radius: var(--radius-md);
    cursor: pointer;
    transition: all var(--transition);
    letter-spacing: -0.01em;
    position: relative;
    overflow: hidden;
    color: #FFF;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    box-shadow: 0 4px 12px rgba(37,99,235,0.3), inset 0 1px 0 rgba(255,255,255,0.15);
  }

  .btn svg {
    width: 18px;
    height: 18px;
    fill: none;
    stroke: currentColor;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .btn:hover {
    box-shadow: 0 6px 20px rgba(37,99,235,0.4), inset 0 1px 0 rgba(255,255,255,0.15);
    transform: translateY(-1px);
  }

  .btn:active {
    transform: translateY(0);
    box-shadow: 0 2px 8px rgba(37,99,235,0.3);
  }

  .btn::after {
    content: '';
    position: absolute;
    top: -50%;
    left: -60%;
    width: 40%;
    height: 200%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
    transform: skewX(-20deg);
    transition: left 0.5s ease;
  }

  .btn:hover::after { left: 120%; }

  .divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 24px 0;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .divider span {
    font-size: 0.75rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 500;
  }

  /* Social buttons */
  .social-row { display: flex; gap: 10px; }

  .btn-social {
    flex: 1;
    height: 46px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-md);
    cursor: pointer;
    font-family: var(--font);
    font-size: 0.8125rem;
    font-weight: 500;
    color: var(--text-secondary);
    transition: all var(--transition);
  }

  .btn-social:hover {
    border-color: #CBD5E1;
    background: #FFF;
    box-shadow: var(--shadow-md);
  }

  .btn-social svg {
    width: 18px;
    height: 18px;
  }

  .foot {
    text-align: center;
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }

  .foot-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .foot a {
    font-size: 0.8125rem;
    color: var(--primary);
    text-decoration: none;
    font-weight: 500;
    transition: color var(--transition);
  }

  .foot a:hover { color: var(--primary-dark); text-decoration: underline; }

  .page-foot {
    text-align: center;
    margin-top: 32px;
    position: relative;
    z-index: 1;
  }

  .page-foot p {
    font-size: 0.75rem;
    color: var(--text-muted);
  }

  @media (max-width: 480px) {
    .card { padding: 28px 20px; }
    .form-head h2 { font-size: 1.25rem; }
    .social-row { flex-direction: column; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }

  .fi:focus-visible { outline: 2px solid var(--primary); outline-offset: 1px; }
</style>
</head>
<body>

<div class="page">
  <div class="blob-bl"></div>
  <div class="container">

    <div class="header">
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        </div>
        <div class="logo-text">SEZERLAND <span>AI ALPHA</span></div>
      </div>
      <p class="header-sub">Integrated Situation — Unified Access Portal</p>
    </div>

    <div class="card">
      <div class="form-head">
        <span class="badge">Student Access</span>
        <h2>Welcome Back</h2>
        <p>Sign in to your student portal account</p>
      </div>

      <form action="#" method="post" autocomplete="on">
        <div class="form-group">
          <label for="email">Email Address</label>
          <div class="input-wrap">
            <svg class="ico" viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="22,4 12,13 2,4"/></svg>
            <input type="email" id="email" name="email" class="fi" placeholder="you@university.edu" required autocomplete="email">
          </div>
        </div>

        <div class="form-group">
          <label for="pw">Password</label>
          <div class="input-wrap">
            <svg class="ico" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" id="pw" name="password" class="fi" placeholder="Enter your password" required autocomplete="current-password">
          </div>
        </div>

        <div class="chk-group">
          <input type="checkbox" id="rem" name="remember">
          <label for="rem">Keep me signed in for 30 days</label>
        </div>

        <button type="submit" class="btn">
          <svg viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
          Sign In
        </button>
      </form>

      <div class="divider"><span>or continue with</span></div>

      <div class="social-row">
        <button type="button" class="btn-social">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 0 0 1 12c0 1.77.42 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Google
        </button>
        <button type="button" class="btn-social">
          <svg viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
          Facebook
        </button>
        <button type="button" class="btn-social">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
          X
        </button>
      </div>

      <div class="foot">
        <div class="foot-row">
          <a href="#">Forgot Password?</a>
          <a href="#">Create Account</a>
        </div>
      </div>
    </div>

    <div class="page-foot">
      <p>&copy; 2025 SEZERLAND AI ALPHA &middot; Privacy &middot; Terms &middot; Support</p>
    </div>

  </div>
</div>

</body>
</html>
