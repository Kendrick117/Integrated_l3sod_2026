<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Innovate Company</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-container">
            <div class="login-brand">
                <div class="brand-icon">🔐</div>
                <h1>Welcome Back</h1>
                <p>Sign in to continue</p>
            </div>

            <div id="message" class="error-message" style="display:none;"></div>

            <form id="loginForm">
                <div class="input-group">
                    <label>Username or Email</label>
                    <input type="text" id="username" placeholder="Enter your username or email" required>
                    <span class="input-icon">👤</span>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                    <span class="input-icon">🔒</span>
                </div>

                <div class="options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="remember"> Remember Me
                    </label>
                    <a href="#" onclick="alert('Contact admin@innovate.com')" class="forgot-link">Forgot Password?</a>
                </div>

                <button type="submit" class="login-btn">Login</button>
            </form>

            <div class="demo-credentials">
                <p>Demo Credentials</p>
                <div class="credentials-box">
                    <span>Username: admin</span>
                    <span>Password: admin123</span>
                </div>
            </div>

            <div class="login-footer">
                <a href="chris index.html">← Back to Home</a>
            </div>
        </div>
    </div>

    <script>
        if (localStorage.getItem('loggedIn') === 'true') {
            window.location.href = 'dashboard.html';
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            const messageDiv = document.getElementById('message');

            if ((username === 'admin' || username === 'admin@innovate.com') && password === 'admin123') {
                localStorage.setItem('loggedIn', 'true');
                localStorage.setItem('username', username);
                if (remember) localStorage.setItem('rememberMe', 'true');
                messageDiv.style.display = 'none';
                window.location.href = 'dashboard.html';
            } else {
                messageDiv.textContent = '❌ Invalid username or password!';
                messageDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
