<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration - Innovate Company</title>
    <link rel="stylesheet" href="css/student.css">
</head>
<body>
    <div class="student-container">
        <div class="student-sidebar">
            <div class="logo">
                <span>🏢</span>
                <h3>Innovate</h3>
            </div>
            <nav>
                <a href="chris dashboard.html">← Dashboard</a>
                <a href="chris index.html">🏠 Home</a>
            </nav>
        </div>

        <div class="student-content">
            <div class="form-header">
                <h1>👨‍🎓 Student Registration</h1>
                <p>Register new students into the system</p>
            </div>

            <div id="successMessage" class="alert success" style="display:none;"></div>
            <div id="errorMessage" class="alert error" style="display:none;"></div>

            <div class="form-card">
                <form id="studentForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Full Name *</label>
                            <input type="text" id="fullName" placeholder="Enter full name" required>
                            <small class="error-text" id="nameError"></small>
                        </div>
                        <div class="form-group">
                            <label>Date of Birth *</label>
                            <input type="date" id="dob" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Gender *</label>
                            <select id="gender" required>
                                <option value="">Select Gender</option>
                                <option>Male</option>
                                <option>Female</option>
                                <option>Other</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Phone Number *</label>
                            <input type="tel" id="phone" placeholder="0788888888" required>
                            <small class="error-text" id="phoneError"></small>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Email *</label>
                        <input type="email" id="email" placeholder="student@example.com" required>
                        <small class="error-text" id="emailError"></small>
                    </div>

                    <div class="form-group">
                        <label>Address *</label>
                        <textarea id="address" rows="3" placeholder="Full address" required></textarea>
                    </div>

                    <div class="form-group">
                        <label>Guardian Name *</label>
                        <input type="text" id="guardian" placeholder="Parent or guardian name" required>
                    </div>

                    <button type="submit" class="submit-btn">Register Student</button>
                </form>
            </div>

            <div class="records-card">
                <h3>📋 Registered Students</h3>
                <div class="table-wrapper">
                    <div id="studentList"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let students = JSON.parse(localStorage.getItem('students') || '[]');

        function displayStudents() {
            const container = document.getElementById('studentList');
            if (students.length === 0) {
                container.innerHTML = '<p class="empty">No students registered yet.</p>';
                return;
            }
            let html = '<table class="data-table">';
            html += '<thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>Guardian</th><th>Date</th></tr></thead><tbody>';
            students.forEach(s => {
                html += `<tr>
                    <td>${s.fullName}</td>
                    <td>${s.email}</td>
                    <td>${s.phone}</td>
                    <td>${s.guardian}</td>
                    <td>${new Date(s.registrationDate).toLocaleDateString()}</td>
                </tr>`;
            });
            html += '</tbody></table>';
            container.innerHTML = html;
        }
        displayStudents();

        document.getElementById('studentForm').addEventListener('submit', function(e) {
            e.preventDefault();
            let isValid = true;
            const name = document.getElementById('fullName').value;
            const phone = document.getElementById('phone').value;
            const email = document.getElementById('email').value;

            if (name.length < 3) {
                document.getElementById('nameError').textContent = 'Name must be at least 3 characters';
                isValid = false;
            } else {
                document.getElementById('nameError').textContent = '';
            }

            if (!/^\d{10}$/.test(phone)) {
                document.getElementById('phoneError').textContent = 'Phone must be 10 digits';
                isValid = false;
            } else {
                document.getElementById('phoneError').textContent = '';
            }

            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                document.getElementById('emailError').textContent = 'Invalid email format';
                isValid = false;
            } else if (students.some(s => s.email === email)) {
                document.getElementById('emailError').textContent = 'Email already registered!';
                isValid = false;
            } else {
                document.getElementById('emailError').textContent = '';
            }

            if (!isValid) return;

            const student = {
                id: Date.now(),
                fullName: name,
                dob: document.getElementById('dob').value,
                gender: document.getElementById('gender').value,
                address: document.getElementById('address').value,
                phone: phone,
                email: email,
                guardian: document.getElementById('guardian').value,
                registrationDate: new Date().toISOString()
            };

            students.push(student);
            localStorage.setItem('students', JSON.stringify(students));
            document.getElementById('successMessage').textContent = '✅ Student registered successfully!';
            document.getElementById('successMessage').style.display = 'block';
            document.getElementById('studentForm').reset();
            displayStudents();
            setTimeout(() => {
                document.getElementById('successMessage').style.display = 'none';
            }, 3000);
        });
    </script>
</body>
</html>
