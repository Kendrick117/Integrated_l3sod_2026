<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Registration - Innovate Co Ltd</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #eef2f3; padding: 30px; }
        .form-card { background: white; max-width: 550px; margin: auto; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        h2 { color: #2c3e50; text-align: center; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #34495e; }
        input, select { width: 100%; padding: 10px; border: 1px solid #dcdde1; border-radius: 8px; box-sizing: border-box; outline: none; }
        input:focus { border-color: #3498db; }
        .row { display: flex; gap: 15px; }
        .row .input-group { flex: 1; }
        button { width: 100%; padding: 12px; background-color: #2c3e50; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        button:hover { background-color: #34495e; }
    </style>
</head>
<body>

<div class="form-card">
    <h2>Book Registration</h2>
    <form action="#" method="POST">
        
        <div class="input-group">
            <label for="bookTitle">Book Title:</label>
            <input type="text" id="bookTitle" name="bookTitle" placeholder="Enter book name" required>
        </div>

        <div class="input-group">
            <label for="author">Author Name:</label>
            <input type="text" id="author" name="author" placeholder="Enter author name" required>
        </div>

        <div class="row">
            <div class="input-group">
                <label for="isbn">ISBN Number:</label>
                <input type="text" id="isbn" name="isbn" placeholder="13-digit code" required>
            </div>
            <div class="input-group">
                <label for="category">Category:</label>
                <select id="category" name="category">
                    <option value="programming">Programming</option>
                    <option value="math">Mathematics</option>
                    <option value="business">Business</option>
                    <option value="literature">Literature</option>
                </select>
            </div>
        </div>

        <div class="row">
            <div class="input-group">
                <label for="regDate">Registration Date:</label>
                <input type="date" id="regDate" name="regDate" required>
            </div>
            <div class="input-group">
                <label for="quantity">Quantity:</label>
                <input type="number" id="quantity" name="quantity" min="1" value="1">
            </div>
        </div>

        <button type="submit">Register Book to System</button>
    </form>
</div>

</body>
</html>
