<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Innovate Co Ltd</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        .login-card h2 {
            margin-top: 0;
            color: #333;
            text-align: center;
        }
        .login-card p {
            text-align: center;
            color: #777;
            font-size: 14px;
            margin-bottom: 25px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box; /* Ensures padding doesn't affect width */
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        button:hover {
            background-color: #218838;
        }
        .links {
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
        }
        .links a {
            color: #007bff;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Innovate Co Ltd</h2>
        <p>Enter your credentials to access the portal</p>
        
        <form action="#" method="POST">
            <label for="user">Username or Email:</label>
            <input type="text" id="user" name="user" placeholder="Enter your email" required>

            <label for="pass">Password:</label>
            <input type="password" id="pass" name="pass" placeholder="••••••••" required>

            <button type="submit">Sign In</button>
        </form>

        <div class="links">
            <a href="#">Forgot Password?</a> | <a href="index.html">Register</a>
        </div>
    </div>

</body>
</html>
