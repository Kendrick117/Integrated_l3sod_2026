<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Registration</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(120deg, #667eea, #764ba2);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: white;
      padding: 20px;
      width: 320px;
      border-radius: 10px;
    }

    h2 {
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #667eea;
      color: white;
      border: none;
      cursor: pointer;
    }

    #msg {
      text-align: center;
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Register</h2>

  <input type="text" id="username" placeholder="Username">
  <input type="email" id="email" placeholder="Email">

  <button onclick="submitForm()">Submit</button>

  <p id="msg"></p>
</div>

<script>
function submitForm() {
  let username = document.getElementById("username").value;
  let email = document.getElementById("email").value;

  // ❌ validation
  if (username === "" || email === "") {
    document.getElementById("msg").style.color = "red";
    document.getElementById("msg").innerText = "Please fill all fields!";
    return;
  }

  // ✅ success message
  document.getElementById("msg").style.color = "green";
  document.getElementById("msg").innerText = "Success! Redirecting...";

  // 🚀 go to students.html
  setTimeout(() => {
    window.location.href = "patrick-students.html";
  }, 1500);
}
</script>

</body>
</html>
